<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - 克喵の友链屋</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      background: white;
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .offline-icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .retry-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }
    
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .cached-pages {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
    
    .cached-pages h3 {
      color: #333;
      font-size: 14px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .cached-list {
      list-style: none;
    }
    
    .cached-list li {
      margin-bottom: 8px;
    }
    
    .cached-list a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    
    .cached-list a:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    @media (max-width: 480px) {
      .offline-container {
        padding: 32px 24px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .offline-icon {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>您已离线</h1>
    <p>无法连接到网络，请检查您的网络连接后重试。部分已缓存的内容仍可访问。</p>
    <button class="retry-btn" onclick="retryConnection()" id="retryBtn">
      <span>重新连接</span>
    </button>
    
    <div class="cached-pages">
      <h3>可访问的缓存页面</h3>
      <ul class="cached-list">
        <li><a href="/">🏠 首页</a></li>
        <li><a href="/article">📄 文章列表</a></li>
      </ul>
    </div>
  </div>
  
  <script>
    function retryConnection() {
      const btn = document.getElementById('retryBtn');
      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner"></span><span>检查中...</span>';
      
      // 尝试重新加载页面
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.reload();
        } else {
          btn.classList.remove('loading');
          btn.innerHTML = '<span>重新连接</span>';
          alert('仍然无法连接到网络，请检查您的网络设置');
        }
      }, 1500);
    }
    
    // 监听网络恢复
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // 如果网络已恢复，自动重定向到首页
    if (navigator.onLine) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
