name: 友链申请
about: 申请添加您的博客到友链列表
title: "[友链申请] "
labels: ["友链申请"]
body:
  - type: markdown
    attributes:
      value: |
        ## 欢迎申请友链！
        请填写以下信息，我们会在审核通过后添加您的博客。

  - type: input
    id: name
    attributes:
      label: 用户昵称
      description: 您希望在友链列表中显示的名称
      placeholder: 例如：克喵
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 博客名称
      description: 您的博客标题
      placeholder: 例如：克喵の友链屋
    validations:
      required: true

  - type: textarea
    id: desc
    attributes:
      label: 博客/用户介绍
      description: 简短介绍您的博客或自己
      placeholder: 例如：分享技术和生活的个人博客
    validations:
      required: true

  - type: dropdown
    id: avatarType
    attributes:
      label: 头像类型
      description: 选择您的头像来源类型
      options:
        - qq
        - github
        - url
    validations:
      required: true

  - type: input
    id: avatar
    attributes:
      label: 头像标识
      description: |
        根据上面选择的头像类型填写：
        - 选择了 **qq**：填写 QQ 号码
        - 选择了 **github**：填写 GitHub 用户名
        - 选择了 **url**：填写头像图片链接
      placeholder: 例如：123456789 或 Kemeow0815 或 https://example.com/avatar.png
    validations:
      required: true

  - type: input
    id: github
    attributes:
      label: GitHub 用户名
      description: 您的 GitHub 用户名（可选）
      placeholder: 例如：Kemeow0815

  - type: input
    id: website
    attributes:
      label: 博客链接
      description: 您的博客网站地址
      placeholder: 例如：https://blog.example.com/
    validations:
      required: true

  - type: input
    id: feed
    attributes:
      label: 博客 RSS 订阅链接
      description: 您的博客 RSS/Atom 订阅地址（可选，用于文章聚合）
      placeholder: 例如：https://blog.example.com/atom.xml

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认事项
      description: 请确认以下事项
      options:
        - label: 我的网站可以正常访问
          required: true
        - label: 我已添加本站友链（推荐）
          required: false
        - label: 我确认提供的信息真实有效
          required: true
