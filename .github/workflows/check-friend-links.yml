name: Check Friend Links

on:
  schedule:
    # 每7天运行一次 (每周日凌晨2点)
    - cron: "0 2 */7 * *"
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check friend links
        id: check
        run: node .github/scripts/check-friend-links.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        timeout-minutes: 60

      - name: Check for changes
        id: check-changes
        run: |
          git add docs/.vitepress/data/members.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有文件变更，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: remove unreachable friend links [skip ci]"
          git push

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-friend-links-logs
          path: |
            check-friend-links-log.json
            backups/
          retention-days: 30

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 友链检测完成"
          else
            echo "❌ 友链检测失败"
          fi
