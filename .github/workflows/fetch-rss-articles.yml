name: Fetch RSS Articles

on:
  schedule:
    # 每4小时运行一次
    - cron: "0 */4 * * *"
  push:
    paths:
      # members.json 文件修改时触发
      - "docs/.vitepress/data/members.json"
  workflow_dispatch:

jobs:
  fetch-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install rss-parser

      - name: Fetch RSS articles
        run: node .github/scripts/fetch-rss-articles.js
        timeout-minutes: 10

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet docs/.vitepress/data/articles.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/.vitepress/data/articles.json
          git commit -m "chore: update RSS articles [skip ci]"
          # 先拉取远程更新，避免推送冲突
          git pull --rebase origin main || git pull origin main
          git push

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ RSS 文章获取成功"
          else
            echo "❌ RSS 文章获取失败"
          fi
