name: Sync Members to Lists

on:
    schedule:
        # 每4小时运行一次
        - cron: "0 */4 * * *"
    push:
        paths:
            # members.json 文件修改时触发
            - "docs/.vitepress/data/members.json"
    workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Sync members to lists
              run: node .github/scripts/sync-members.js

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --quiet docs/.vitepress/data/lists.json; then
                    echo "changed=false" >> $GITHUB_OUTPUT
                  else
                    echo "changed=true" >> $GITHUB_OUTPUT
                  fi

            - name: Commit and push changes
              if: steps.check-changes.outputs.changed == 'true'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add docs/.vitepress/data/lists.json
                  git commit -m "chore: sync members to lists.json [skip ci]"
                  git push
